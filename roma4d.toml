# Roma4D (r4d) project manifest — same role as Cargo.toml for the Roma4D toolchain.
name = "roma4d"
version = "0.1.0"
edition = "2025"

[package]
authors = ["RomanAI Labs"]
description = "The first 4D spacetime programming language."

[build]
# Future: sub-second compile target; LLVM / CUDA backends plug in here.
default_backend = "llvm"
backend = "llvm"
incremental = true

[systems]
gc = false
unsafe = true

# Phase 3 — HyperEngine cognitive controller (llama-cpp-python + local GGUF).
# When model_path points to an existing file, `r4d --explain script.py` may call the GGUF bridge for blocked Kinetic loops.
# Override: R4D_COGNITIVE=0 to disable, R4D_COGNITIVE=1 to force on if the file exists.
[llm]
model_path = "C:/Users/Asus/Downloads/Phi-3-mini-4k-instruct-q4.gguf"
n_gpu_layers = 0
